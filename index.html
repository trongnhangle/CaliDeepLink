<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cali Life - California Fitness & Yoga</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat';
            background-color: #1a0505;
            color: #fff;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background-color: #1a0505;
            background-image: url('assets/backgroud.png');
            background-repeat: no-repeat;
            background-size: 80%;
            background-position: center 120px;
            padding: 20px 20px 32px;
            position: relative;
        }

        /* Logo row */
        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            position: relative;
        }

        .logo {
            display: flex;
            justify-content: center;
        }

        /* Language Switcher */
        .lang-switcher {
            position: absolute;
            right: 0;
        }

        .lang-trigger {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            padding: 5px 10px 5px 8px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            color: rgba(255, 255, 255, 0.7);
            transition: background 0.2s ease;
            user-select: none;
        }

        .lang-trigger:hover {
            background: rgba(255, 255, 255, 0.13);
        }

        .lang-trigger .chevron {
            font-size: 9px;
            opacity: 0.6;
            transition: transform 0.2s ease;
            margin-top: 1px;
        }

        .lang-switcher.open .chevron {
            transform: rotate(180deg);
        }

        .lang-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #2a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            min-width: 148px;
            z-index: 100;
        }

        .lang-switcher.open .lang-dropdown {
            display: block;
        }

        .lang-option {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 11px 14px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.65);
            background: transparent;
            border: none;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s ease, color 0.15s ease;
            letter-spacing: 0.2px;
        }

        .lang-option .flag {
            font-size: 20px;
            line-height: 1;
            flex-shrink: 0;
        }

        .lang-option.active {
            color: #fff;
            background: rgba(224, 35, 28, 0.2);
        }

        .lang-option.active::after {
            content: '✓';
            margin-left: auto;
            font-size: 12px;
            color: #e0231c;
        }

        .lang-option:hover:not(.active) {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
        }

        .logo img {
            width: 200px;
        }

        /* Body text */
        .body-text {
            font-size: 15px;
            line-height: 1.7;
            color: #f0f0f0;
            margin-bottom: 22px;
        }

        .body-text strong {
            color: #fff;
            font-weight: 700;
        }

        /* Banner */
        .banner {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 26px;
            position: relative;
            container-type: inline-size;
            /* enables cqw — scales with banner width */
        }

        .banner img {
            width: 100%;
            display: block;
        }

        /* Banner overlay – left 62%, everything sized in em relative to 2cqw base
           so the layout is pixel-perfect proportional on every device */
        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 62%;
            background: linear-gradient(to right, rgba(8, 1, 1, 0.94) 50%, transparent 100%);
            display: flex;
            align-items: center;
            font-size: 2.35cqw;
            /* single source of truth — all children use em */
            padding: 1.35em 1.65em 1.35em 1.5em;
        }

        .banner-content {
            display: flex;
            flex-direction: column;
            gap: 0.38em;
            width: 100%;
            overflow: hidden;
        }

        .banner-headline {
            font-family: 'Oswald';
            font-size: 3.15em;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.11em;
            text-transform: uppercase;
            line-height: 0.92;
            text-shadow: 0 0.2em 1.2em rgba(0, 0, 0, 0.7);
            text-wrap: balance;
        }

        .banner-subtitle {
            font-size: 1.08em;
            color: rgba(255, 255, 255, 0.78);
            line-height: 1.3;
            margin-top: 0.1em;
        }

        .banner-divider {
            width: 2.8em;
            height: 0.2em;
            background: #e0231c;
            border-radius: 0.2em;
            margin: 0.22em 0;
        }

        .banner-features {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.3em;
        }

        .banner-features li {
            font-size: 1.05em;
            color: rgba(255, 255, 255, 0.86);
            display: flex;
            align-items: flex-start;
            gap: 0.48em;
            line-height: 1.18;
        }

        .banner-features li::before {
            content: '';
            display: inline-block;
            width: 0.5em;
            height: 0.5em;
            background: #e0231c;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 0.28em;
        }

        .banner-cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5em;
            background: #e0231c;
            color: #fff;
            font-size: 1.08em;
            font-weight: 700;
            padding: 0.72em 1em;
            border-radius: 2em;
            text-decoration: none;
            letter-spacing: 0.04em;
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
            box-shadow: 0 0.3em 1em rgba(224, 35, 28, 0.5);
            margin-top: 0.35em;
            align-self: flex-start;
            white-space: normal;
            text-align: center;
            line-height: 1.12;
            max-width: 100%;
            text-wrap: balance;
            text-transform: uppercase;
        }

        .banner-cta-btn:hover {
            background: #c0180f;
            transform: translateY(-0.1em);
            box-shadow: 0 0.5em 1.4em rgba(224, 35, 28, 0.55);
        }

        /* Why section */
        .why-title {
            font-family: 'Oswald';
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
        }

        /* Feature cards */
        .features {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 26px;
        }

        .feature-card {
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1.5px solid #c0392b;
            border-radius: 10px;
            padding: 14px 16px;
            background-color: rgba(26, 5, 5, 0.4);
        }

        .feature-card img {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            flex-shrink: 0;
            object-fit: cover;
        }

        .feature-card p {
            font-size: 15px;
            color: #f0f0f0;
            line-height: 1.5;
        }

        /* Sign-off */
        .sign-off {
            font-size: 15px;
            line-height: 1.7;
            color: #f0f0f0;
            margin-bottom: 28px;
        }

        /* CTA Button */
        .cta-btn {
            display: block;
            width: 100%;
            background-color: #e0231c;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            text-align: center;
            padding: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: background 0.2s ease;
        }

        .cta-btn:hover {
            background-color: #c0180f;
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- Logo + Language Switcher -->
        <div class="logo-row">
            <div class="logo">
                <img src="assets/logo.png" alt="California Fitness & Yoga" />
            </div>
            <div class="lang-switcher" id="langSwitcher">
                <div class="lang-trigger" id="langTrigger" onclick="toggleDropdown()">
                    <span id="currentFlag">🇻🇳</span>
                    <span class="chevron">▼</span>
                </div>
                <div class="lang-dropdown">
                    <button class="lang-option" id="optVi" onclick="setLang('vi')">
                        <span class="flag">🇻🇳</span> Tiếng Việt
                    </button>
                    <button class="lang-option" id="optEn" onclick="setLang('en')">
                        <span class="flag">🇺🇸</span> English
                    </button>
                </div>
            </div>
        </div>

        <!-- Intro text -->
        <p class="body-text" id="bodyText"></p>

        <!-- Banner -->
        <div class="banner">
            <img src="assets/banner.png" id="bannerImg" alt="" />
            <div class="banner-overlay">
                <div class="banner-content">
                    <div class="banner-headline">CALI LIFE</div>
                    <p class="banner-subtitle" id="bannerSubtitle"></p>
                    <div class="banner-divider"></div>
                    <ul class="banner-features">
                        <li id="bannerF1"></li>
                        <li id="bannerF2"></li>
                        <li id="bannerF3"></li>
                    </ul>
                    <a href="#" class="banner-cta-btn" id="bannerCtaBtn"></a>
                </div>
            </div>
        </div>

        <!-- Why download -->
        <h2 class="why-title" id="whyTitle"></h2>

        <div class="features">
            <div class="feature-card">
                <img src="assets/check_in.png" alt="Check-in" />
                <p id="feature1"></p>
            </div>
            <div class="feature-card">
                <img src="assets/book.png" alt="Book" />
                <p id="feature2"></p>
            </div>
            <div class="feature-card">
                <img src="assets/follow.png" alt="Offers" />
                <p id="feature3"></p>
            </div>
        </div>

        <!-- Sign-off -->
        <p class="sign-off" id="signOff"></p>

        <!-- CTA -->
        <a href="#" class="cta-btn" id="ctaBtn"></a>

    </div>

    <script>
        var translations = {
            vi: {
                bodyText: 'Kính gửi Quý Hội viên,<br /><br />Nằm trong kế hoạch chuyển đổi số, đặt Hội viên và Khách hàng làm trọng tâm của trải nghiệm, chúng tôi ra mắt ứng dụng tập luyện mới - <strong>Cali Life</strong> - mang đến sự thuận tiện, chủ động và cá nhân hóa cho hành trình sống khỏe của bạn.<br /><br /><strong>Lịch chuyển đổi</strong><br /><br />· <strong>27.03.2026</strong>: Hội viên có thể tải Cali Life và trải nghiệm các tính năng quen thuộc.<br /><br />· <strong>01.04.2026</strong>: Cali Life là ứng dụng duy nhất dành riêng cho hội viên California, giúp quản lý thẻ, đặt lớp và sử dụng dịch vụ tại các câu lạc bộ.<br /><br />Cảm ơn Quý Hội viên đã lựa chọn sống khỏe cùng chúng tôi.',
                bannerAlt: 'Ra mắt ứng dụng Cali Life',
                whyTitle: 'Tiện ích dành cho hội viên',
                feature1: 'Check-in vào câu lạc bộ nhanh chóng bằng mã QR',
                feature2: 'Đặt trước lịch lớp Group X và Yoga',
                feature3: 'Cập nhật ưu đãi và quyền lợi độc quyền',
                signOff: 'Trân trọng,<br />Đội ngũ California Fitness &amp; Yoga',
                ctaBtn: 'Tải Cali Life',
                bannerSubtitle: 'Ứng dụng mới dành cho hội viên California từ 26.03.2026',
                bannerF1: 'Quản lý thẻ',
                bannerF2: 'Đặt lớp',
                bannerF3: 'Check-in CLB nhanh chóng',
                bannerCta: 'Tải app CALI LIFE'
            },
            en: {
                bodyText: 'Dear Valued Members,<br /><br />As part of our digital transformation strategy, placing our Members and Customers at the heart of the experience, we are pleased to introduce our new member app - <strong>Cali Life</strong> - designed to provide greater convenience, control and personalization for your wellness journey.<br /><br /><strong>Transition Timeline</strong><br /><br />· <strong>March 27, 2026</strong>: You can download Cali Life and begin using the familiar features.<br /><br />· <strong>April 1, 2026</strong>: Cali Life will become the only application for California members, allowing you to manage your membership, book classes and access club services.<br /><br />Thank you for choosing to live well with us.',
                bannerAlt: 'Cali Life App Launch',
                whyTitle: 'Features on Cali Life',
                feature1: 'Quick club check-in with QR code',
                feature2: 'Book Group X and Yoga classes in advance',
                feature3: 'Stay updated with exclusive offers and member privileges',
                signOff: 'Best regards,<br />The California Fitness &amp; Yoga Team',
                ctaBtn: 'Download Cali Life',
                bannerSubtitle: 'The new app for California members from 26.03.2026',
                bannerF1: 'Manage membership',
                bannerF2: 'Book classes',
                bannerF3: 'Check in to clubs quickly',
                bannerCta: 'Download CALI LIFE'
            }
        };

        var flags = { vi: '🇻🇳', en: '🇺🇸' };

        function toggleDropdown() {
            document.getElementById('langSwitcher').classList.toggle('open');
        }

        function setLang(lang) {
            var t = translations[lang];
            var ctaBtn = document.getElementById('ctaBtn');
            document.getElementById('bodyText').innerHTML = t.bodyText;
            document.getElementById('bannerImg').alt = t.bannerAlt;
            document.getElementById('whyTitle').textContent = t.whyTitle;
            document.getElementById('feature1').textContent = t.feature1;
            document.getElementById('feature2').textContent = t.feature2;
            document.getElementById('feature3').textContent = t.feature3;
            document.getElementById('signOff').innerHTML = t.signOff;
            document.getElementById('bannerSubtitle').textContent = t.bannerSubtitle;
            document.getElementById('bannerF1').textContent = t.bannerF1;
            document.getElementById('bannerF2').textContent = t.bannerF2;
            document.getElementById('bannerF3').textContent = t.bannerF3;
            var bannerCtaBtnEl = document.getElementById('bannerCtaBtn');
            if (bannerCtaBtnEl) { bannerCtaBtnEl.textContent = t.bannerCta; }
            if (ctaBtn) {
                ctaBtn.textContent = t.ctaBtn;
            }
            document.documentElement.lang = lang;
            document.getElementById('currentFlag').textContent = flags[lang];
            document.getElementById('optVi').classList.toggle('active', lang === 'vi');
            document.getElementById('optEn').classList.toggle('active', lang === 'en');
            document.getElementById('langSwitcher').classList.remove('open');
            try { localStorage.setItem('cali_lang', lang); } catch (e) { }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function (e) {
            var switcher = document.getElementById('langSwitcher');
            if (!switcher.contains(e.target)) {
                switcher.classList.remove('open');
            }
        });

        // Priority: saved preference > browser language > default Vietnamese
        var savedLang;
        try { savedLang = localStorage.getItem('cali_lang'); } catch (e) { }
        var browserLang = (navigator.language || navigator.userLanguage || 'vi').toLowerCase();
        var initialLang = savedLang || (browserLang.startsWith('vi') ? 'vi' : 'en');
        setLang(initialLang);

        // App store redirect based on device
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isApple = /iPhone|iPad|iPod|Macintosh|Mac OS X/i.test(ua);
        var ctaBtn = document.getElementById('ctaBtn');
        var appUrl = isApple
            ? 'https://apps.apple.com/vn/app/cali-life/id6759941144'
            : 'https://play.google.com/store/apps/details?id=com.caligym';
        if (ctaBtn) {
            ctaBtn.href = appUrl;
        }
        var bannerCtaBtn = document.getElementById('bannerCtaBtn');
        if (bannerCtaBtn) {
            bannerCtaBtn.href = appUrl;
        }
    </script>
</body>

</html>
